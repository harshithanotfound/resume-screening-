<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Screening System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>AI Resume Screening System</h1>
    <p class="subtitle">
        Paste your resume and job description to get ATS score, predicted role, matched skills, and missing skills.
    </p>

    <label for="resumeText">Resume Text</label>
    <textarea id="resumeText" placeholder="Paste your resume text here..."></textarea>

    <label for="jobDescription">Job Description</label>
    <textarea id="jobDescription" placeholder="Paste the job description here..."></textarea>

    <button onclick="analyzeResume()">Analyze Resume</button>

    <div id="loading" class="hidden">Analyzing...</div>

    <div id="result" class="result hidden">
        <h2>Analysis Result</h2>

        <div class="score-box">
            <h3>ATS Score</h3>
            <div class="score" id="atsScore">0%</div>
        </div>

        <p><strong>Predicted Role:</strong> <span id="role"></span></p>
        <p><strong>Model Confidence:</strong> <span id="confidence"></span>%</p>
        <p><strong>Recommendation:</strong> <span id="recommendation"></span></p>

        <h3>Matched Skills</h3>
        <div id="matchedSkills" class="skills"></div>

        <h3>Missing Skills</h3>
        <div id="missingSkills" class="skills missing"></div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
